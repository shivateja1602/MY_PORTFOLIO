<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- NVIDIA Green Background -->
  <rect width="200" height="200" fill="#76B900"/>
  
  <!-- NVIDIA Logo Text/Shape -->
  <g fill="white">
    <!-- N -->
    <rect x="30" y="60" width="18" height="80" rx="3"/>
    <polygon points="48,60 70,60 52,140 30,140" fill="white"/>
    
    <!-- V -->
    <polygon points="70,60 100,140 130,60 130,60 105,130 75,130" fill="white"/>
    
    <!-- I -->
    <rect x="140" y="60" width="18" height="80" rx="3" fill="white"/>
    
    <!-- D -->
    <rect x="160" y="60" width="18" height="80" rx="3" fill="white"/>
    <path d="M 178 60 Q 195 100 178 140 L 178 60" fill="white"/>
    
    <!-- I (second) -->
    <rect x="35" y="145" width="18" height="18" rx="2" fill="white"/>
    
    <!-- A -->
    <polygon points="60,145 75,165 90,145 90,163 60,163" fill="white"/>
  </g>
</svg>